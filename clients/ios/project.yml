name: MiniWhiteHouse
options:
  bundleIdPrefix: com.miniwhitehouse
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"
  createIntermediateGroups: true

packages:
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: "2.3.0"

targets:
  MiniWhiteHouse:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MiniWhiteHouse
    resources:
      - path: MiniWhiteHouse/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nanoclaw.ios
        DEVELOPMENT_TEAM: 8HU2W469PT
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        SWIFT_VERSION: "5.9"
        INFOPLIST_FILE: MiniWhiteHouse/Info.plist
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
    dependencies:
      - package: MarkdownUI
